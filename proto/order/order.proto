syntax = "proto3";

package order;

option go_package = "github.com/medinanurbek/generated-repo/go/order";

service OrderService {
  rpc SubscribeToOrderUpdates(OrderRequest) returns (stream OrderStatusUpdate);
}

message OrderRequest {
  string order_id = 1;
}

message OrderStatusUpdate {
  string order_id = 1;
  string status = 2;
  string updated_at = 3;
}
