syntax = "proto3";

package payment;

option go_package = "github.com/medinanurbek/generated-repo/go/payment";

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
  string order_id = 1;
  double amount = 2;
  string currency = 3;
}

message PaymentResponse {
  string status = 1;
  string transaction_id = 2;
}
